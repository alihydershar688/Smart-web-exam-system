    <script>
        (function () {
            // Fixed version — don't use Date.now() which busts browser cache on every load
            const SHELL_VIEW_VERSION = 'v20260428';
            const ALLOWED_PAGES = new Set([
                'dashboard-teacher.html',
                'create-exam.html',
                'question-editor.html',
                'exam-preview.html',
                'exam-results.html',
                'profile.html',
                'analytics.html',
                'question-bank.html',
                'view-exam.html'
            ]);
            const DASHBOARD_VIEWS = new Set(['dashboard', 'submissions', 'results', 'students']);
            const HASH_VIEW_MAP = new Map([
                ['#recentexamssection', 'dashboard'],
                ['#examssection', 'dashboard'],
                ['#profilesection', 'dashboard'],
                ['#pendingsection', 'submissions'],
                ['#pendinggradingsection', 'submissions'],
                ['#resultssection', 'results'],
                ['#studentssection', 'students']
            ]);

            const frame = document.getElementById('teacherShellFrame');
            const navLinks = Array.from(document.querySelectorAll('#teacherShellNav .sidebar-link'));
            const profileHeaderLink = document.getElementById('teacherShellProfileLink');
            const profileLinks = [profileHeaderLink].filter(Boolean);
            let frameResizeObserver = null;

            function normalizeDashboardTarget(url) {
                const hash = String(url.hash || '').trim().toLowerCase();
                const requestedView = String(url.searchParams.get('view') || '').trim().toLowerCase();
                const nextView = HASH_VIEW_MAP.get(hash) || (DASHBOARD_VIEWS.has(requestedView) ? requestedView : 'dashboard');
                return nextView === 'dashboard'
                    ? 'dashboard-teacher.html?view=dashboard'
                    : `dashboard-teacher.html?view=${encodeURIComponent(nextView)}`;
            }

            function sanitizeTarget(rawTarget) {
                const fallback = 'dashboard-teacher.html?view=dashboard';
                if (!rawTarget) return fallback;
                try {
                    const url = new URL(rawTarget, window.location.href);
                    if (url.origin !== window.location.origin) return fallback;
                    const file = (url.pathname.split('/').pop() || '').toLowerCase();
                    if (!ALLOWED_PAGES.has(file)) return fallback;
                    if (file === 'dashboard-teacher.html') {
                        return normalizeDashboardTarget(url);
                    }
                    const clean = new URL(url.pathname.split('/').pop(), window.location.href);
                    clean.search = url.search;
                    clean.hash = url.hash;
                    return `${clean.pathname.split('/').pop()}${clean.search}${clean.hash}`;
                } catch (error) {
                    return fallback;
                }
            }

            function buildEmbeddedSrc(target) {
                const url = new URL(sanitizeTarget(target), window.location.href);
                url.searchParams.set('embed', '1');
                url.searchParams.set('shellv', SHELL_VIEW_VERSION);
                return `${url.pathname.split('/').pop()}${url.search}${url.hash}`;
            }

            function getTargetFromLocation() {
                const params = new URLSearchParams(window.location.search || '');
                return sanitizeTarget(params.get('page'));
            }

            function setActiveNav(target) {
                const url = new URL(sanitizeTarget(target), window.location.href);
                const file = (url.pathname.split('/').pop() || '').toLowerCase();
                const hash = url.hash || '';
                const view = (url.searchParams.get('view') || '').toLowerCase();
                const mode = (url.searchParams.get('mode') || '').toLowerCase();
                let activeKey = 'dashboard';

                if (file === 'create-exam.html' || file === 'question-editor.html' || file === 'exam-preview.html' || file === 'question-bank.html' || file === 'view-exam.html') {
                    activeKey = 'create';
                } else if (file === 'exam-results.html' && mode === 'review') {
                    activeKey = 'submissions';
                } else if (file === 'exam-results.html') {
                    activeKey = 'results';
                } else if (file === 'analytics.html') {
                    activeKey = 'analytics';
                } else if (file === 'profile.html') {
                    activeKey = 'profile';
                } else if (file === 'dashboard-teacher.html' && view === 'submissions') {
                    activeKey = 'submissions';
                } else if (file === 'dashboard-teacher.html' && view === 'results') {
                    activeKey = 'results';
                } else if (file === 'dashboard-teacher.html' && view === 'students') {
                    activeKey = 'students';
                } else if (file === 'dashboard-teacher.html' && hash === '#pendingSection') {
                    activeKey = 'submissions';
                } else if (file === 'dashboard-teacher.html' && hash === '#studentsSection') {
                    activeKey = 'students';
                } else if (file === 'dashboard-teacher.html' && hash === '#resultsSection') {
                    activeKey = 'results';
                }

                navLinks.forEach((link) => {
                    link.classList.toggle('active', activeKey && link.dataset.nav === activeKey);
                });
                document.body.classList.toggle('teacher-shell-profile-view', activeKey === 'profile');
            }

            function updateHistory(target, replace) {
                const nextUrl = `teacher-shell.html?page=${encodeURIComponent(sanitizeTarget(target))}`;
                if (replace) {
                    window.history.replaceState({ page: target }, '', nextUrl);
                } else {
                    window.history.pushState({ page: target }, '', nextUrl);
                }
            }

            function resizeFrame() {
                if (!frame || !frame.contentDocument) return;
                const doc = frame.contentDocument;
                const body = doc.body;
                const html = doc.documentElement;
                if (!body || !html) return;
                const nextHeight = Math.max(
                    body.scrollHeight,
                    body.offsetHeight,
                    html.clientHeight,
                    html.scrollHeight,
                    html.offsetHeight
                );
                const rawMin = body.dataset.shellMinHeight || html.dataset.shellMinHeight || '720';
                const minHeight = Number.isFinite(Number(rawMin)) ? Number(rawMin) : 720;
                frame.style.height = `${Math.max(nextHeight, minHeight)}px`;
            }

            function bindFrameResizeObserver() {
                if (!frame || !frame.contentDocument) return;
                if (frameResizeObserver) {
                    frameResizeObserver.disconnect();
                }
                const body = frame.contentDocument.body;
                if (!body || !window.ResizeObserver) {
                    resizeFrame();
                    return;
                }
                frameResizeObserver = new window.ResizeObserver(() => resizeFrame());
                frameResizeObserver.observe(body);
                resizeFrame();
            }

            function syncHeaderIdentity() {
                const profile = window.UserProfile ? window.UserProfile.getStoredProfile() : null;
                const displayName = (profile && profile.displayName) || localStorage.getItem('userName') || 'Teacher Panel';
                const roleLabel = 'Teacher';
                const initials = (profile && profile.initials)
                    || String(displayName)
                        .split(/\s+/)
                        .filter(Boolean)
                        .slice(0, 2)
                        .map((part) => part[0].toUpperCase())
                        .join('')
                    || 'TE';

                if (window.UserProfile && window.UserProfile.renderAvatar) {
                    window.UserProfile.renderAvatar('teacherShellHeaderAvatar', {
                        name: displayName,
                        initials,
                        photoUrl: profile?.profile_photo_url || ''
                    });
                } else {
                    document.getElementById('teacherShellHeaderAvatar').textContent = initials;
                }
                profileLinks.forEach((link) => {
                    link.setAttribute('href', 'teacher-shell.html?page=profile.html');
                });
            }

            function showFrameLoading() {
                const overlay = document.getElementById('shellLoadingOverlay');
                if (overlay) {
                    overlay.style.display = 'flex';
                }
                // Fade out iframe so old content isn't visible
                frame.style.opacity = '0';
                frame.style.pointerEvents = 'none';
            }

            function hideFrameLoading() {
                const overlay = document.getElementById('shellLoadingOverlay');
                if (overlay) overlay.style.display = 'none';
                // Always restore iframe visibility
                frame.style.opacity = '1';
                frame.style.pointerEvents = '';
                frame.style.visibility = 'visible';
            }

            function navigate(target, options) {
                const nextTarget = sanitizeTarget(target);
                const frameSrc = buildEmbeddedSrc(nextTarget);
                // Update active nav IMMEDIATELY — before iframe loads
                setActiveNav(nextTarget);
                if (!options || !options.skipHistory) {
                    updateHistory(nextTarget, !!(options && options.replaceHistory));
                }
                if (frame.getAttribute('src') !== frameSrc) {
                    // Show loading overlay instantly so old content never flashes
                    showFrameLoading();
                    // Safety: hide overlay after 8s even if frame never fires load
                    if (window._shellLoadTimeout) clearTimeout(window._shellLoadTimeout);
                    window._shellLoadTimeout = setTimeout(hideFrameLoading, 8000);
                    frame.setAttribute('src', frameSrc);
                }
            }

            window.TeacherShellHost = {
                navigate(target, options) {
                    navigate(target, options || {});
                },
                sanitizeTarget
            };

            function handleFrameLoad() {
                try {
                    const frameUrl = new URL(frame.contentWindow.location.href);
                    const file = frameUrl.pathname.split('/').pop() || 'dashboard-teacher.html';
                    frameUrl.searchParams.delete('embed');
                    const target = `${file}${frameUrl.search}${frameUrl.hash}`;
                    setActiveNav(target);
                    updateHistory(target, true);
                    if (frame.contentDocument && frame.contentDocument.title) {
                        document.title = `${frame.contentDocument.title.split('|')[0].trim()} | Teacher Dashboard`;
                    }
                    bindFrameResizeObserver();
                } catch (error) {
                    resizeFrame();
                } finally {
                    // Always hide loading overlay when frame finishes loading
                    if (window._shellLoadTimeout) clearTimeout(window._shellLoadTimeout);
                    hideFrameLoading();
                }
            }

            function initShellNavigation() {
                navLinks.forEach((link) => {
                    link.addEventListener('click', function (event) {
                        event.preventDefault();
                        navigate(link.dataset.page || link.getAttribute('href'), { replaceHistory: false });
                    });
                });

                profileLinks.forEach((link) => {
                    link.addEventListener('click', function (event) {
                        event.preventDefault();
                        navigate('profile.html', { replaceHistory: false });
                    });
                });

                window.addEventListener('popstate', function () {
                    navigate(getTargetFromLocation(), { skipHistory: true });
                });

                frame.addEventListener('load', handleFrameLoad);
            }

            function logout() {
                if (window.SessionManager) {
                    window.SessionManager.logout('manual');
                    return;
                }
                localStorage.clear();
                sessionStorage.clear();
                window.location.href = 'login.html';
            }

            document.getElementById('teacherShellLogoutBtn').addEventListener('click', logout);

            if (window.SessionManager && !window.SessionManager.init({ loginUrl: 'login.html', requireAuth: true })) {
                return;
            }

            if ((localStorage.getItem('userRole') || '').toLowerCase() !== 'teacher') {
                window.location.href = 'login.html';
                return;
            }

            syncHeaderIdentity();
            initShellNavigation();

            if (window.AppShell) {
                window.AppShell.init();
            }

            // Ensure iframe is always visible on init
            frame.style.opacity = '1';
            frame.style.visibility = 'visible';
            frame.style.pointerEvents = '';

            // Show loading immediately on first load — before iframe renders anything
            showFrameLoading();
            navigate(getTargetFromLocation(), { replaceHistory: true });
        })();
    </script>
