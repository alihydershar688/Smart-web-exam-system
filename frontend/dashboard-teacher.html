<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231E3A8A'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-size='28' fill='white' font-family='Arial' font-weight='bold'%3ETE%3C/text%3E%3C/svg%3E">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Teacher Dashboard | Smart Exam System</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --adm-bg:           #F0F4FF;
            --adm-bg2:          #EFF6FF;
            --adm-card:         #FFFFFF;
            --adm-card-hover:   #EFF6FF;
            --adm-border:       #DBEAFE;
            --adm-sidebar:      #1E3A8A;
            --adm-menu-item:    rgba(255,255,255,0.06);
            --adm-active:       #1e40af;
            --adm-hover:        #2563EB;
            --adm-sidebar-text: #CBD5E8;
            --adm-topbar:       #1E3A8A;
            --adm-input-bg:     #F0F4FF;
            --adm-input-border: #BFDBFE;
            --adm-heading:      #1E3A8A;
            --adm-text:         #1F2937;
            --adm-muted:        #6B7280;
            --adm-primary:      #1E3A8A;
            --adm-primary-hov:  #1e40af;
            --adm-secondary:    #FFFFFF;
            --adm-danger:       #DC2626;
            --adm-danger-hov:   #B91C1C;
            --adm-shadow:       0 4px 16px rgba(30, 58, 138, 0.1);
            --adm-shadow-sm:    0 2px 8px rgba(30, 58, 138, 0.07);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Manrope", sans-serif;
            background: var(--adm-bg);
            color: var(--adm-text);
            min-height: 100vh;
            font-size: 14px;
        }

        .dashboard-header {
            background: var(--adm-card);
            border: 1px solid var(--adm-border);
            border-radius: 10px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--adm-shadow-sm);
        }

        .dashboard-header h1 {
            color: var(--adm-heading);
            font-size: 28px;
            margin-bottom: 0.5rem;
        }

        .dashboard-header p {
            color: var(--adm-muted);
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--adm-card);
            border: 1px solid var(--adm-border);
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: var(--adm-shadow-sm);
            transition: all 0.3s ease;
            position: relative;
            border-bottom: 4px solid transparent;
        }

        .stat-card:nth-child(1) {
            border-bottom-color: #1E3A8A;
        }

        .stat-card:nth-child(2) {
            border-bottom-color: #10B981;
        }

        .stat-card:nth-child(3) {
            border-bottom-color: #60A5FA;
        }

        .stat-card:nth-child(4) {
            border-bottom-color: #F59E0B;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--adm-shadow);
        }

        .stat-card-label {
            color: var(--adm-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .stat-card-value {
            color: var(--adm-heading);
            font-size: 28px;
            font-weight: 700;
        }

        .stat-card-subtitle {
            color: var(--adm-muted);
            font-size: 12px;
            margin-top: 0.5rem;
        }

        .content-section {
            margin-bottom: 2rem;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .content-header h2 {
            color: var(--adm-heading);
            font-size: 20px;
        }

        .table-container {
            background: var(--adm-card);
            border: 1px solid var(--adm-border);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--adm-shadow-sm);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead {
            background: var(--adm-sidebar);
            color: white;
        }

        table th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
        }

        table td {
            padding: 1rem;
            border-bottom: 1px solid var(--adm-border);
        }

        table tbody tr:hover {
            background: var(--adm-bg2);
        }

        .btn {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--adm-primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--adm-primary-hov);
        }

        .btn-secondary {
            background: #3B82F6;
            color: white;
        }

        .btn-secondary:hover {
            background: #2563EB;
        }

        .badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-success {
            background: #DBEAFE;
            color: #1E3A8A;
        }

        .badge-warning {
            background: #FEF3C7;
            color: #92400E;
        }

        .badge-danger {
            background: #FEE2E2;
            color: #991B1B;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--adm-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--adm-muted);
        }

        .error {
            background: #FEE2E2;
            color: #991B1B;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid #DC2626;
        }

        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .table-container {
                overflow-x: auto;
            }
            table {
                font-size: 12px;
            }
            table th, table td {
                padding: 0.75rem;
            }
        }
    </style>
</head>
<body class="teacher-dashboard-page">
    <div class="container">
        <!-- Dashboard Header -->
        <div class="dashboard-header">
            <h1>Welcome, <span id="teacherName">Teacher</span></h1>
            <p>Monitor exams, grade submissions, and track student performance</p>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-card-label">Total Exams</div>
                <div class="stat-card-value" id="totalExams">0</div>
                <div class="stat-card-subtitle">Created</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-label">Active Exams</div>
                <div class="stat-card-value" id="activeExams">0</div>
                <div class="stat-card-subtitle">Running now</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-label">Pending Grading</div>
                <div class="stat-card-value" id="pendingGrading">0</div>
                <div class="stat-card-subtitle">To review</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-label">Students</div>
                <div class="stat-card-value" id="totalStudents">0</div>
                <div class="stat-card-subtitle">Enrolled</div>
            </div>
        </div>

        <!-- Exams Section -->
        <div class="content-section">
            <div class="content-header">
                <h2>Your Exams</h2>
                <button class="btn btn-primary" onclick="window.location.href='/create-exam.html'">
                    <i class="bi bi-plus-circle"></i> Create Exam
                </button>
            </div>
            <div id="examsContainer" class="table-container">
                <div class="loading">Loading exams...</div>
            </div>
        </div>

        <!-- Pending Submissions Section -->
        <div class="content-section">
            <div class="content-header">
                <h2>Pending Submissions</h2>
                <button class="btn btn-secondary">View All</button>
            </div>
            <div id="submissionsContainer" class="table-container">
                <div class="loading">Loading submissions...</div>
            </div>
        </div>
    </div>

    <script src="/js/app-config.js"></script>
    <script>
        // Get auth headers from the app config (same as login.html uses)
        async function getAuthHeaders() {
            try {
                if (window.AppConfig && window.AppConfig.buildAuthHeaders) {
                    return await window.AppConfig.buildAuthHeaders(window.supabaseClient, {
                        'Content-Type': 'application/json'
                    });
                }
            } catch (error) {
                console.warn('AppConfig not available:', error);
            }

            // Fallback: Try to get token from sessionStorage
            const sbAccessToken = sessionStorage.getItem('sb-access-token') || localStorage.getItem('sb-access-token');
            const authToken = sessionStorage.getItem('authToken') || localStorage.getItem('authToken');
            const supabaseAuth = sessionStorage.getItem('sb-auth') || localStorage.getItem('sb-auth');
            
            const token = sbAccessToken || authToken || supabaseAuth;
            
            console.log('Auth Debug:', {
                sbAccessToken: !!sbAccessToken,
                authToken: !!authToken,
                supabaseAuth: !!supabaseAuth,
                selectedToken: !!token,
                availableKeys: Object.keys(sessionStorage)
            });
            
            return {
                'Authorization': token ? `Bearer ${token}` : '',
                'Content-Type': 'application/json'
            };
        }

        async function loadDashboardData() {
            try {
                // Get auth headers properly
                const headers = await getAuthHeaders();
                
                // Get user info
                const userEmail = sessionStorage.getItem('userEmail') || localStorage.getItem('userEmail');
                const userName = sessionStorage.getItem('userName') || localStorage.getItem('userName') || 'Teacher';
                document.getElementById('teacherName').textContent = userName;

                // Get exams
                const examsRes = await fetch('/api/exams', {
                    headers: headers,
                    credentials: 'include'
                });

                if (examsRes.ok) {
                    const examsData = await examsRes.json();
                    const exams = examsData.exams || [];
                    
                    document.getElementById('totalExams').textContent = exams.length;
                    document.getElementById('activeExams').textContent = exams.filter(e => e.status === 'active').length;

                    if (exams.length > 0) {
                        const examsHTML = `
                            <table>
                                <thead>
                                    <tr>
                                        <th>Exam Title</th>
                                        <th>Date</th>
                                        <th>Status</th>
                                        <th>Submissions</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${exams.slice(0, 5).map(exam => `
                                        <tr>
                                            <td>${exam.title || 'Untitled Exam'}</td>
                                            <td>${new Date(exam.created_at).toLocaleDateString()}</td>
                                            <td><span class="badge badge-success">${exam.status}</span></td>
                                            <td>${exam.submission_count || 0}</td>
                                            <td><button class="btn btn-primary btn-sm">View</button></td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        `;
                        document.getElementById('examsContainer').innerHTML = examsHTML;
                    } else {
                        document.getElementById('examsContainer').innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon"><i class="bi bi-inbox"></i></div>
                                <p>No exams created yet. <a href="/create-exam.html">Create your first exam</a></p>
                            </div>
                        `;
                    }
                } else {
                    console.error('Exams fetch failed:', examsRes.status, examsRes.statusText);
                    document.getElementById('examsContainer').innerHTML = `
                        <div class="error">
                            Failed to load exams. Status: ${examsRes.status}. Please ensure you are logged in.
                        </div>
                    `;
                }

                // Get submissions
                const submissionsRes = await fetch('/api/submissions?status=pending_grading', {
                    headers: headers,
                    credentials: 'include'
                });

                if (submissionsRes.ok) {
                    const submissionsData = await submissionsRes.json();
                    const submissions = submissionsData.submissions || [];
                    
                    document.getElementById('pendingGrading').textContent = submissions.length;

                    if (submissions.length > 0) {
                        const submissionsHTML = `
                            <table>
                                <thead>
                                    <tr>
                                        <th>Student</th>
                                        <th>Exam</th>
                                        <th>Submitted</th>
                                        <th>Status</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${submissions.slice(0, 5).map(sub => `
                                        <tr>
                                            <td>${sub.student_name || 'Unknown'}</td>
                                            <td>${sub.exam_title || 'Unknown'}</td>
                                            <td>${new Date(sub.submitted_at).toLocaleDateString()}</td>
                                            <td><span class="badge badge-warning">Pending</span></td>
                                            <td><button class="btn btn-primary btn-sm">Grade</button></td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        `;
                        document.getElementById('submissionsContainer').innerHTML = submissionsHTML;
                    } else {
                        document.getElementById('submissionsContainer').innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon"><i class="bi bi-check-circle"></i></div>
                                <p>No pending submissions. All exams have been graded!</p>
                            </div>
                        `;
                    }
                } else {
                    console.error('Submissions fetch failed:', submissionsRes.status);
                    document.getElementById('submissionsContainer').innerHTML = `
                        <div class="error">
                            Failed to load submissions. Status: ${submissionsRes.status}
                        </div>
                    `;
                }

                // Get students count
                const coursesRes = await fetch('/api/teacher/courses', {
                    headers: headers,
                    credentials: 'include'
                });

                if (coursesRes.ok) {
                    const coursesData = await coursesRes.json();
                    let totalStudents = 0;
                    if (Array.isArray(coursesData)) {
                        totalStudents = coursesData.reduce((sum, course) => sum + (course.student_count || 0), 0);
                    }
                    document.getElementById('totalStudents').textContent = totalStudents;
                }

            } catch (error) {
                console.error('Error loading dashboard:', error);
                const errorMsg = `<div class="error">Error loading dashboard: ${error.message}</div>`;
                document.getElementById('examsContainer').innerHTML = errorMsg;
                document.getElementById('submissionsContainer').innerHTML = errorMsg;
            }
        }

        // Load data when page loads
        document.addEventListener('DOMContentLoaded', loadDashboardData);

        // Reload periodically
        setInterval(loadDashboardData, 30000);
    </script>
</body>
</html>
