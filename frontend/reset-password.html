<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Smart Exam System</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
        }

        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
            text-decoration: none;
            display: block;
            margin-bottom: 20px;
        }

        .auth-header h1 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 10px;
        }

        .auth-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s;
            font-family: 'Manrope', sans-serif;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Manrope', sans-serif;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error-message,
        .success-message {
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
            font-weight: 500;
        }

        .error-message {
            background: linear-gradient(135deg, #fee 0%, #fdd 100%);
            color: #c33;
            border-left: 4px solid #c33;
        }

        .success-message {
            background: linear-gradient(135deg, #dfd 0%, #cfc 100%);
            color: #383;
            border-left: 4px solid #383;
        }

        .error-message.show,
        .success-message.show {
            display: block;
        }

        .auth-footer {
            margin-top: 25px;
            text-align: center;
        }

        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }


        :root {
            --ink: #f8fafc;
            --muted: rgba(203, 213, 225, 0.84);
            --surface: rgba(15, 44, 82, 0.68);
            --surface-alt: rgba(12, 36, 66, 0.8);
            --border: rgba(148, 163, 184, 0.35);
            --shadow: 0 12px 30px rgba(8, 17, 38, 0.28);
        }

        body {
            color: var(--ink);
            background: linear-gradient(120deg, #051739 0%, #0b3970 52%, #0f766e 100%) !important;
        }

        .auth-card {
            background: var(--surface-alt) !important;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .logo, .auth-header h1 { color: #f8fafc !important; }
        .auth-header p, .form-label, .auth-footer a { color: var(--muted) !important; }
        .form-control {
            background: rgba(15, 23, 42, 0.45) !important;
            color: #f8fafc !important;
            border: 1px solid var(--border) !important;
        }
        .form-control::placeholder { color: rgba(203, 213, 225, 0.62); }
        .btn-primary { background: linear-gradient(135deg, #0f766e, #14b8a6) !important; }
        .error-message { background: rgba(239, 68, 68, 0.15) !important; color: #fecaca !important; border-left-color: #ef4444 !important; }
        .success-message { background: rgba(16, 185, 129, 0.15) !important; color: #a7f3d0 !important; border-left-color: #10b981 !important; }

    </style>
    <link rel="stylesheet" href="css/ui-system.css?v=blue4">
    <link rel="stylesheet" href="css/product-theme.css?v=blue4">
    <link rel="stylesheet" href="css/auth-shell.css?v=blue4">
</head>
<body>
    <div class="auth-container">
        <div class="auth-topbar">
            <a href="index.html" class="back-link">
                <span>Back to Home</span>
            </a>
        </div>
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo">
                    <span class="logo-mark">SE</span>
                    <span>Smart Exam System</span>
                </a>
                <div class="header-row">
                    <div class="header-copy">
                        <h1>Set New Password</h1>
                    </div>
                </div>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="resetPasswordForm">
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" id="newPasswordInput" class="form-control" placeholder="Enter new password" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="confirmPasswordInput" class="form-control" placeholder="Confirm password" required>
                </div>
                <button type="submit" class="btn btn-primary" id="resetBtn">Update Password</button>
            </form>

            <div class="auth-footer">
                <a href="login.html">Back to login</a>
            </div>
        </div>
    </div>

    <script src="js/supabase.min.js"></script>
    <script src="js/app-config.js"></script>
    <script>
        const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.AppConfig;
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const resetPasswordForm = document.getElementById('resetPasswordForm');
        const newPasswordInput = document.getElementById('newPasswordInput');
        const confirmPasswordInput = document.getElementById('confirmPasswordInput');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const resetBtn = document.getElementById('resetBtn');

        const isMissingJwtUserError = (error) =>
            typeof error?.message === 'string' &&
            error.message.toLowerCase().includes('user from sub claim in jwt does not exist');

        const clearRecoveryState = async () => {
            try {
                await supabaseClient.auth.signOut();
            } catch (_) {
            }
            history.replaceState({}, document.title, window.location.pathname);
        };

        const showError = (message) => {
            errorMessage.textContent = 'Error: ' + message;
            errorMessage.classList.add('show');
            successMessage.classList.remove('show');
        };

        const showSuccess = (message) => {
            successMessage.textContent = 'Success: ' + message;
            successMessage.classList.add('show');
            errorMessage.classList.remove('show');
        };

        const validatePassword = (password) => {
            const errors = [];
            if (password.length < 8) {
                errors.push('at least 8 characters');
            }
            if (!/[a-z]/.test(password)) {
                errors.push('one lowercase letter');
            }
            if (!/[A-Z]/.test(password)) {
                errors.push('one uppercase letter');
            }
            if (!/[0-9]/.test(password)) {
                errors.push('one number');
            }
            if (!/[^A-Za-z0-9]/.test(password)) {
                errors.push('one special character');
            }

            return errors;
        };

        const initializeRecoverySession = async () => {
            const url = new URL(window.location.href);
            const code = url.searchParams.get('code');
            if (code) {
                const { error } = await supabaseClient.auth.exchangeCodeForSession(code);
                if (isMissingJwtUserError(error)) {
                    await clearRecoveryState();
                    return { error: new Error('This recovery link belongs to an account that no longer exists. Request a new reset email after confirming the account email.') };
                }
                if (!error) {
                    history.replaceState({}, document.title, window.location.pathname);
                }
                return error ? { error } : { error: null };
            }

            const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
            const accessToken = hashParams.get('access_token');
            const refreshToken = hashParams.get('refresh_token');
            const recoveryType = hashParams.get('type');

            if (accessToken && refreshToken && recoveryType === 'recovery') {
                const { error } = await supabaseClient.auth.setSession({
                    access_token: accessToken,
                    refresh_token: refreshToken
                });
                if (isMissingJwtUserError(error)) {
                    await clearRecoveryState();
                    return { error: new Error('This recovery link belongs to an account that no longer exists. Request a new reset email after confirming the account email.') };
                }
                if (!error) {
                    history.replaceState({}, document.title, window.location.pathname);
                }
                return error ? { error } : { error: null };
            }

            return { error: null };
        };

        const recoverySessionReady = initializeRecoverySession();

        resetPasswordForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (!newPassword || !confirmPassword) {
                showError('Please fill in all fields');
                return;
            }

            if (newPassword !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            const passwordIssues = validatePassword(newPassword);
            if (passwordIssues.length > 0) {
                showError(`Password must include ${passwordIssues.join(', ')}`);
                return;
            }

            resetBtn.disabled = true;
            resetBtn.textContent = 'Updating...';

            try {
                const recoveryState = await recoverySessionReady;
                if (recoveryState?.error) {
                    showError('Reset link is invalid or expired. Please request a new one.');
                    resetBtn.disabled = false;
                    resetBtn.textContent = 'Update Password';
                    return;
                }

                const { data, error: sessionError } = await supabaseClient.auth.getSession();
                if (sessionError || !data || !data.session) {
                    if (isMissingJwtUserError(sessionError)) {
                        await clearRecoveryState();
                    }
                    showError('Reset link is invalid or expired. Please request a new one.');
                    resetBtn.disabled = false;
                    resetBtn.textContent = 'Update Password';
                    return;
                }

                const { error: updateError } = await supabaseClient.auth.updateUser({
                    password: newPassword
                });

                if (updateError) {
                    if (isMissingJwtUserError(updateError)) {
                        await clearRecoveryState();
                        showError('The recovery session no longer matches a valid account. Request a new reset email and try again.');
                    } else {
                        showError(updateError.message || 'Failed to update password. Please try again.');
                    }
                    resetBtn.disabled = false;
                    resetBtn.textContent = 'Update Password';
                    return;
                }

                showSuccess('Password updated successfully. Redirecting to login...');
                resetBtn.textContent = 'Updated';
                await supabaseClient.auth.signOut();
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } catch (error) {
                console.error('Reset password error:', error);
                showError('An error occurred. Please try again.');
                resetBtn.disabled = false;
                resetBtn.textContent = 'Update Password';
            }
        });
    </script>
    <script src="js/ui-feedback.js"></script>
</body>
</html>
